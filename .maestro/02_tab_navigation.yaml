# タブナビゲーションフロー
# 前提: 01_feed_empty_state フロー完了後、またはフィード画面が表示済み
# 確認内容: 各タブボタンをタップして画面遷移が完了することを確認する
appId: com.bonlog.app
---
- launchApp:
    clearState: false

# フィード画面が起点であることを確認
- assertVisible:
    text: "ホーム"

# 検索タブへ遷移
- tapOn:
    accessibilityLabel: "検索"
- assertVisible:
    text: "検索"

# 通知タブへ遷移
- tapOn:
    accessibilityLabel: "通知"
- assertVisible:
    text: "通知"

# プロフィールタブへ遷移
- tapOn:
    accessibilityLabel: "プロフィール"
- assertVisible:
    text: "プロフィール"

# ホームタブへ戻る
- tapOn:
    accessibilityLabel: "ホーム"
- assertVisible:
    text: "ホーム"
